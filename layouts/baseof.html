<!DOCTYPE html>
<html lang="{{ or site.Language.LanguageCode site.Language.Lang }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body id="top">
  <header>
    {{ partial "header.html" . }}
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ if .Param "math" }}
    {{ partial "math.html" . }}
  {{ end }}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.post article img').forEach(function(img) {
        if (!img.closest('a') && !img.closest('.gallery-scroll')) {
          var alt = img.getAttribute('alt') || '';
          var hasFx = alt.includes('fx');
    
          var wrapper = document.createElement('div');
          wrapper.className = 'md-image-item';
          img.parentNode.insertBefore(wrapper, img);
          wrapper.appendChild(img);
    
          if (hasFx) {
            var overlay = document.createElement('div');
            overlay.className = 'gallery-overlay';
            wrapper.appendChild(overlay);
            wrapper.classList.add('has-fx');
          }
    
          wrapper.addEventListener('click', function() {
            var lb = GLightbox({
              elements: [{ href: img.src, type: 'image' }],
              touchNavigation: true
            });
            lb.open();
          });
        }
      });
    
      const lightbox = GLightbox({
        selector: '.glightbox',
        touchNavigation: true,
        loop: true
      });
    });
  </script>
</body>
</html>
