<div class="gallery-scroll my-4">
  {{ range split (.Get "images") "|" }}
    {{ $url := trim . " " }}
    {{ if $url }}
      <a href="{{ $url }}" class="glightbox" data-gallery="gallery-{{ $.Ordinal }}">
        <figure class="gallery-item">
          <img src="{{ $url }}" alt="">
          <div class="gallery-overlay"></div>
        </figure>
      </a>
    {{ end }}
  {{ end }}
</div>
